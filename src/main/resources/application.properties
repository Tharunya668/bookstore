spring.application.name=bookstore
server.port=8080

# H2 file database — saves to ./data/bookstore.mv.db automatically
# Data survives restarts, no MySQL/Postgres to install
spring.datasource.url=jdbc:h2:file:./data/bookstore;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Optional: view your database at http://localhost:8080/h2-console
# Set JDBC URL to: jdbc:h2:file:./data/bookstore
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
